#History limit
set -g history-limit 5000


# automatically renumber tmux windows
set -g renumber-windows on

#Index Start
set -g base-index 1

# Mouse
#set-option -g -q mouse on

#Force reload of config file
unbind r
bind r source-file ~/.tmux.conf


setw -g monitor-activity on
set -g visual-activity on


#Changes C-b to C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind-key C-a send-prefix
# set -g default-terminal "screen-256color"
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:Tc"




# statusbar

# VI mode
setw -g mode-keys vi
set -g status-keys vi

#Vim bindings for copy paste
bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# TO use the system buffer for copy paste
# bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi y send -X copy-pipe 'xclip -in -selection clipboard'

bind-key -T copy-mode-vi Enter send-keys -X cancel

# Copying with mouse drag
set -g mouse on


# Pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# fzf switchers
# prefix + s: fuzzy switch session (preview shows pane capture of first window)
bind s display-popup -w 80% -h 70% -E "\
  tmux list-sessions -F '#S: #{session_windows} windows' | \
  fzf --reverse --preview 'echo {} | sed \"s/: .*//\" | xargs -I% tmux capture-pane -ep -t %:' --preview-window=right:60% | \
  sed 's/: .*//' | xargs tmux switch-client -t"
# prefix + S: fuzzy kill session(s) — TAB to multi-select
bind S display-popup -w 80% -h 70% -E "\
  tmux list-sessions -F '#S: #{session_windows} windows' | \
  fzf --reverse --multi --preview 'echo {} | sed \"s/: .*//\" | xargs -I% tmux capture-pane -ep -t %:' --preview-window=right:60% | \
  sed 's/: .*//' | sort -r | xargs -I{} tmux kill-session -t '{}'"
# prefix + w: fuzzy switch window across all sessions (preview shows pane capture)
bind w display-popup -w 80% -h 70% -E "\
  tmux list-windows -a -F '#{session_name}:#{window_index}: #{window_name} [#{pane_current_command}]' | \
  fzf --reverse --preview 'echo {} | sed \"s/: .*//\" | xargs -I% tmux capture-pane -ep -t %' --preview-window=right:60% | \
  sed 's/: .*//' | xargs -I{} sh -c 'tmux switch-client -t {} && tmux select-window -t {}'"
# prefix + W: fuzzy kill window(s) — TAB to multi-select
bind W display-popup -w 80% -h 70% -E "\
  tmux list-windows -a -F '#{session_name}:#{window_index}: #{window_name} [#{pane_current_command}]' | \
  fzf --reverse --multi --preview 'echo {} | sed \"s/: .*//\" | xargs -I% tmux capture-pane -ep -t %' --preview-window=right:60% | \
  sed 's/: .*//' | sort -r | xargs -I{} tmux kill-window -t '{}'"
# prefix + e: fuzzy switch pane across all sessions (preview shows pane capture)
bind e display-popup -w 80% -h 70% -E "\
  tmux list-panes -a -F '#S:#{window_index}.#{pane_index}: [#{window_name}] #{pane_current_command} #{pane_current_path}' | \
  fzf --reverse --preview 'echo {} | sed \"s/: .*//\" | xargs -I% tmux capture-pane -ep -t %' --preview-window=right:60% | \
  sed 's/: .*//' | xargs -I{} sh -c 'tmux switch-client -t {} && tmux select-window -t {} && tmux select-pane -t {}'"
# prefix + f: action menu for rename, move, swap, join, break, layout
bind f display-popup -w 40% -h 40% -E "\
  printf 'rename-session\nrename-window\nmove-window\nswap-window\nswap-pane\njoin-pane\nbreak-pane\nselect-layout\n' | \
  fzf --reverse | xargs -I{} tmux command-prompt -p '{}:' '{} %%'"

# binding esc to go to copy-mode-vi
#unbind [
#bind Escape copy-mode

set -sg escape-time 0

set-option -g status on
set-option -g status-interval 5
#set-option -g status-justify "centre"
set-option -g status-left-length 60
set-option -g status-right-length 90

set -g status-left '#{?pane_input_off,#[fg=colour160],#[fg=colour136]}[#[fg=colour136]#S:#I.#P#{?pane_input_off,#[fg=colour160],#[fg=colour136]}] '
set -g status-right '#[fg=colour166]#([ "$(tmux show-option -g prefix)" != "prefix C-a" ] && echo "($(tmux show-option -g prefix | cut -c 8-)) ")#[fg=colour33]%d %b %Y #{?client_prefix,#[fg=colour160],#[fg=colour61]}- #[fg=colour64]%I:%M %p #{?client_prefix,#[fg=colour160],#[fg=colour61]}- #[fg=colour37]#([ -f $HOME/.name ] && cat $HOME/.name || hostname)'





#### color (Solarized 256)
set -g status-style bg=colour235,fg=colour136
setw -g window-status-style fg=colour244
setw -g window-status-current-style fg=colour166
setw -g window-status-activity-style fg=colour61
setw -g window-status-bell-style fg=colour61
set -g pane-border-style fg=colour85
set -g pane-active-border-style fg=colour240
set -g message-style bg=colour235,fg=colour166


# pane number display
set -g display-panes-active-colour colour166 #blue
set -g display-panes-colour colour33 #orange


# TMUX plugin manager
# Set this up following instructions here
# https://github.com/tmux-plugins/tpm

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'dipeshkaphle/tmux-window-name'

# tmux-window-name settings
set -g @tmux_window_name_shells "['zsh', 'bash', 'sh', 'fish']"
set -g @tmux_window_name_use_tilde "True"
set -g @tmux_window_name_max_name_len "50"

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
